<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — vinhtrinh.com</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { background: #0f0f1e; color: #e0e0f0; }

  .hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1040 100%);
    border-bottom: 1px solid rgba(108, 99, 255, 0.2);
    padding: 4rem 2rem 3rem;
    text-align: center;
  }

  .hero-name {
    font-size: clamp(2.5rem, 7vw, 4rem);
    font-weight: 900;
    font-family: 'Courier New', Courier, monospace;
    background: linear-gradient(135deg, #ffffff 0%, #a09af8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .hero-sub { font-size: 1rem; color: #a0a0b8; letter-spacing: 1px; }
  .hero-sub span { color: #6c63ff; font-weight: 600; }

  .content { max-width: 720px; margin: 0 auto; padding: 3rem 2rem; }
  .section { margin-bottom: 3rem; }

  .section-title {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6c63ff;
    margin-bottom: 1rem;
  }

  .bio-text { font-size: 1.05rem; line-height: 1.85; color: #c8c8e0; }

  .interest-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.75rem;
  }

  .interest-card {
    background: rgba(108, 99, 255, 0.08);
    border: 1px solid rgba(108, 99, 255, 0.2);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    font-size: 0.9rem;
    color: #c8c8e0;
    transition: border-color 0.2s, background 0.2s;
  }

  .interest-card:hover {
    border-color: rgba(108, 99, 255, 0.5);
    background: rgba(108, 99, 255, 0.15);
  }

  .interest-card .icon { font-size: 1.3rem; margin-bottom: 0.4rem; display: block; }

  .currently-items { display: flex; flex-direction: column; gap: 0.75rem; }

  .currently-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    font-size: 0.95rem;
    color: #c8c8e0;
    line-height: 1.5;
  }

  .currently-item .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6c63ff;
    margin-top: 0.45rem;
    flex-shrink: 0;
  }

  .fun-facts {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .fun-fact {
    font-size: 0.9rem;
    color: #a0a0b8;
    line-height: 1.7;
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .fun-fact:last-child { border-bottom: none; }
  .fun-fact::before { content: '✦ '; color: #6c63ff; }

  .contact-section {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    color: #a0a0b8;
    font-size: 0.9rem;
  }

  .contact-section a { color: #6c63ff; text-decoration: none; margin: 0 0.5rem; font-weight: 500; }
  .contact-section a:hover { text-decoration: underline; }

  .variant-note {
    text-align: center;
    padding: 1rem 2rem 2rem;
    font-size: 0.75rem;
    color: #4a4a6a;
  }

  .variant-links a { color: #6c63ff; text-decoration: none; margin: 0 0.5rem; }
  .variant-links a:hover { text-decoration: underline; }
  .variant-links a.current { color: #4a4a6a; pointer-events: none; }
</style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="weather.html#aurora">Aurora</a>
  <a href="weather.html#weather">Weather</a>
  <a href="countdown.html">Countdown</a>
  <a href="about.html" class="active">About</a>
</nav>

<div class="hero">
  <div class="hero-name" id="name"></div>
  <div class="hero-sub" id="program"></div>
</div>

<div class="content">
  <div class="section">
    <div class="section-title">// who i am</div>
    <p class="bio-text" id="bio"></p>
  </div>

  <div class="section">
    <div class="section-title">// what i care about</div>
    <div class="interest-grid" id="interests"></div>
  </div>

  <div class="section">
    <div class="section-title">// currently</div>
    <div class="currently-items" id="currently"></div>
  </div>

  <div class="section">
    <div class="section-title">// misc</div>
    <div class="fun-facts" id="misc"></div>
  </div>
</div>

<div class="contact-section" id="contact"></div>

<div class="variant-note">
  Style variants — pick your favorite:
  <div class="variant-links" style="margin-top:0.4rem;">
    <a href="about.html">A: Terminal</a>
    <a href="about-b.html">B: Clean Card</a>
    <a href="about-c.html" class="current">C: Expressive</a>
  </div>
</div>

<script>
  fetch('about.json')
    .then(r => r.json())
    .then(d => {
      document.getElementById('name').textContent = d.name;
      document.getElementById('program').innerHTML =
        d.program.replace('UW', '<span>UW</span>');
      document.getElementById('bio').textContent = d.bio_casual;
      document.getElementById('interests').innerHTML = d.interests
        .map(i => `<div class="interest-card"><span class="icon">${i.icon}</span>${i.label}</div>`).join('');
      document.getElementById('currently').innerHTML = d.currently
        .map(c => `<div class="currently-item"><div class="dot"></div>${c}</div>`).join('');
      document.getElementById('misc').innerHTML = d.misc
        .map(m => `<div class="fun-fact">${m}</div>`).join('');
      document.getElementById('contact').innerHTML =
        `Say hi: <a href="mailto:${d.contact.email}">${d.contact.email}</a> · <a href="${d.contact.linkedin}">LinkedIn</a>`;
    });
</script>

</body>
</html>
