<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — vinhtrinh.com</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
    background: #0d0d1a;
    color: #c8c8e0;
    font-family: 'Courier New', Courier, monospace;
  }

  .page-header {
    padding: 3rem 2rem 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .page-header h1 {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 700;
    color: #e8e8f0;
    margin-bottom: 0.4rem;
  }

  .page-header p {
    color: #6a6a8a;
    font-size: 0.9rem;
  }

  /* Filter chips */
  .filters {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .filter-chip {
    background: transparent;
    border: 1px solid rgba(108, 99, 255, 0.3);
    color: #a0a0b8;
    padding: 0.3rem 0.85rem;
    border-radius: 50px;
    font-size: 0.8rem;
    font-family: 'Courier New', Courier, monospace;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-chip:hover {
    border-color: rgba(108, 99, 255, 0.6);
    color: #c8c8e0;
  }

  .filter-chip.active {
    background: rgba(108, 99, 255, 0.2);
    border-color: #6c63ff;
    color: #ffffff;
  }

  /* Patent callout */
  .patent-callout {
    max-width: 1100px;
    margin: 0 auto 2rem;
    padding: 0 2rem;
  }

  .patent-card {
    background: rgba(108, 99, 255, 0.08);
    border: 1px solid rgba(108, 99, 255, 0.4);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .patent-icon { font-size: 1.5rem; flex-shrink: 0; }

  .patent-text { font-size: 0.9rem; color: #c8c8e0; line-height: 1.5; }
  .patent-text strong { color: #a09af8; }

  /* Card grid */
  .grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  .card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(108, 99, 255, 0.2);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    transition: border-color 0.2s, transform 0.2s;
    text-decoration: none;
    color: inherit;
  }

  .card:hover {
    border-color: rgba(108, 99, 255, 0.5);
    transform: translateY(-2px);
  }

  a.card { cursor: pointer; }

  .card-link-hint {
    font-size: 0.75rem;
    color: #6c63ff;
    margin-top: auto;
    padding-top: 0.25rem;
  }

  .card.hidden { display: none; }

  .card-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #e8e8f0;
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .category-tag {
    font-size: 0.72rem;
    color: #6a6a8a;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .status-badge {
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 50px;
    white-space: nowrap;
  }

  .status-shipped     { background: rgba(0,200,100,0.15); color: #4caf80; border: 1px solid rgba(0,200,100,0.3); }
  .status-completed   { background: rgba(0,200,100,0.15); color: #4caf80; border: 1px solid rgba(0,200,100,0.3); }
  .status-deprecated  { background: rgba(150,150,150,0.1); color: #888; border: 1px solid rgba(150,150,150,0.2); }
  .status-in-progress { background: rgba(255,200,0,0.1); color: #c8a000; border: 1px solid rgba(255,200,0,0.25); }
  .status-concept     { background: rgba(108,99,255,0.12); color: #a09af8; border: 1px solid rgba(108,99,255,0.3); }

  .card-description {
    font-size: 0.85rem;
    color: #c0c0d8;
    line-height: 1.6;
    flex: 1;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }

  .tag {
    font-size: 0.72rem;
    padding: 0.15rem 0.5rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    color: #6a6a8a;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; padding: 0 1rem 3rem; }
    .page-header, .filters, .patent-callout { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="projects.html" class="active">Projects</a>
  <a href="countdown.html">Countdown</a>
  <a href="about.html">About</a>
</nav>

<div class="page-header">
  <h1>Projects</h1>
  <p>Things I've built, shipped, researched, and dreamed up.</p>
</div>

<div class="filters" id="filters">
  <button class="filter-chip active" data-filter="all">All</button>
  <button class="filter-chip" data-filter="Personal">Personal</button>
  <button class="filter-chip" data-filter="Professional">Professional</button>
  <button class="filter-chip" data-filter="School">School</button>
  <button class="filter-chip" data-filter="Concept">Concept</button>
</div>

<div class="patent-callout" id="patentCallout" style="display:none">
  <div class="patent-card">
    <div class="patent-icon">📜</div>
    <div class="patent-text">
      <strong>Two US Patents</strong> in the email and messaging space —
      filed during work on end-to-end encrypted communication systems.
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
  const statusLabel = {
    'shipped': 'shipped',
    'completed': 'completed',
    'deprecated': 'deprecated',
    'in-progress': 'in progress',
    'concept': 'concept'
  };

  fetch('projects.json')
    .then(r => r.json())
    .then(projects => {
      const grid = document.getElementById('grid');
      const patentCallout = document.getElementById('patentCallout');

      projects.forEach(p => {
        if (p.highlight) return; // patents rendered separately

        const card = document.createElement(p.link ? 'a' : 'div');
        card.className = 'card';
        card.dataset.category = p.category;
        if (p.link) card.href = p.link;

        card.innerHTML = `
          <div class="card-title">${p.title}</div>
          <div class="card-meta">
            <span class="category-tag">${p.category}</span>
            <span class="status-badge status-${p.status}">${statusLabel[p.status]}</span>
          </div>
          <div class="card-description">${p.description}</div>
          <div class="tag-list">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          ${p.link ? '<div class="card-link-hint">view project →</div>' : ''}
        `;

        grid.appendChild(card);
      });

      // Show patent callout when Professional filter is active or All
      updatePatentVisibility('all');
    });

  function updatePatentVisibility(filter) {
    const patentCallout = document.getElementById('patentCallout');
    patentCallout.style.display = (filter === 'all' || filter === 'Professional') ? 'block' : 'none';
  }

  // Filter logic
  document.getElementById('filters').addEventListener('click', e => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;

    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');

    const filter = chip.dataset.filter;
    updatePatentVisibility(filter);

    document.querySelectorAll('.card').forEach(card => {
      const show = filter === 'all' || card.dataset.category === filter;
      card.classList.toggle('hidden', !show);
    });
  });
</script>

</body>
</html>
