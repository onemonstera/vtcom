<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather — vinhtrinh.com</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
    background: #0d0d1a;
    color: #c8c8e0;
    font-family: 'Courier New', Courier, monospace;
  }

  .weather-page {
    max-width: 920px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
  }

  /* Header */
  .page-header { margin-bottom: 2rem; }

  .page-title {
    font-size: clamp(1.75rem, 5vw, 2.5rem);
    font-weight: 900;
    color: #e8e8f0;
    margin-bottom: 0.25rem;
  }

  .page-sub {
    font-size: 0.9rem;
    color: #6a6a8a;
    margin-bottom: 0.5rem;
  }

  .why-note {
    display: inline-block;
    font-size: 0.75rem;
    color: #6c63ff;
    border: 1px solid rgba(108,99,255,0.25);
    border-radius: 50px;
    padding: 0.15rem 0.6rem;
    margin-top: 0.25rem;
  }

  /* View toggle */
  .view-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .toggle-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 50px;
    padding: 0.4rem 1rem;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8rem;
    color: #6a6a8a;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn:hover { border-color: rgba(108,99,255,0.4); color: #c8c8e0; }
  .toggle-btn.active { background: rgba(108,99,255,0.15); border-color: #6c63ff; color: #e8e8f0; }

  /* Section labels */
  .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6c63ff;
    margin-bottom: 1rem;
  }

  /* === BY CITY VIEW === */
  .view-city { display: none; }
  .view-city.active { display: block; }

  .city-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }

  .city-column {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(108,99,255,0.15);
    border-radius: 12px;
    padding: 1.25rem;
  }

  .city-name {
    font-size: 1rem;
    font-weight: 700;
    color: #e8e8f0;
    margin-bottom: 0.25rem;
  }

  .city-coords {
    font-size: 0.65rem;
    color: #4a4a6a;
    margin-bottom: 1rem;
  }

  .city-day {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0;
    border-top: 1px solid rgba(108,99,255,0.08);
    flex-wrap: wrap;
  }

  .city-day:first-of-type { border-top: none; }

  .city-day-name {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6a6a8a;
    width: 3.5rem;
    flex-shrink: 0;
  }

  .city-day-emoji { font-size: 1.3rem; flex-shrink: 0; }

  .city-day-info { flex: 1; min-width: 0; }

  .city-day-temps {
    font-size: 0.82rem;
    color: #c8c8e0;
  }

  .city-day-temps .high { font-weight: 700; color: #e8e8f0; }

  .city-day-alt {
    font-size: 0.68rem;
    color: #5a5a7a;
  }

  .city-day-precip {
    font-size: 0.68rem;
    color: #6a6a8a;
    flex-shrink: 0;
  }

  .city-day-precip.wet { color: #7ab8f5; }

  .city-day.best {
    border-left: 2px solid rgba(0,200,100,0.5);
    padding-left: 0.5rem;
    background: rgba(0,200,100,0.04);
    border-radius: 4px;
  }

  /* === BY DAY VIEW === */
  .view-day { display: none; }
  .view-day.active { display: block; }

  .day-section {
    margin-bottom: 1.5rem;
  }

  .day-header {
    font-size: 0.85rem;
    font-weight: 700;
    color: #e8e8f0;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .day-date {
    font-size: 0.7rem;
    color: #4a4a6a;
    font-weight: 400;
  }

  .day-cities {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .day-city-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.7rem 1rem;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(108,99,255,0.1);
    border-radius: 8px;
    flex-wrap: wrap;
  }

  .day-city-row:hover {
    border-color: rgba(108,99,255,0.25);
  }

  .day-city-row.best {
    border-left: 3px solid rgba(0,200,100,0.5);
    background: rgba(0,200,100,0.04);
  }

  .day-city-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: #c8c8e0;
    width: 6.5rem;
    flex-shrink: 0;
  }

  .day-city-emoji {
    font-size: 1.5rem;
    flex-shrink: 0;
  }

  .day-city-condition {
    font-size: 0.78rem;
    color: #8a8aaa;
    width: 7rem;
    flex-shrink: 0;
  }

  .day-city-temps {
    font-size: 0.85rem;
    color: #c8c8e0;
  }

  .day-city-temps .high { font-weight: 700; color: #e8e8f0; }

  .day-city-alt {
    font-size: 0.7rem;
    color: #5a5a7a;
  }

  .day-city-precip {
    font-size: 0.78rem;
    color: #6a6a8a;
    margin-left: auto;
    flex-shrink: 0;
  }

  .day-city-precip.wet { color: #7ab8f5; }

  .best-label {
    font-size: 0.65rem;
    color: #4caf80;
    margin-left: 0.5rem;
  }

  /* Loading / error */
  .status-msg {
    color: #6a6a8a;
    font-size: 0.9rem;
    padding: 2rem 0;
  }

  .error-msg {
    color: #f5827a;
    font-size: 0.9rem;
    padding: 1rem;
    border: 1px solid rgba(245,130,122,0.2);
    border-radius: 8px;
  }

  /* Footer */
  .data-note {
    margin-top: 2rem;
    font-size: 0.72rem;
    color: #4a4a6a;
    border-top: 1px solid rgba(108,99,255,0.1);
    padding-top: 1rem;
  }

  .data-note a { color: #6c63ff; text-decoration: none; }

  /* === AURORA SECTION === */
  .aurora-section { margin-bottom: 2rem; }

  .aurora-day {
    margin-bottom: 1.5rem;
  }

  .aurora-day-header {
    font-size: 0.85rem;
    font-weight: 700;
    color: #e8e8f0;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .kp-badge {
    font-size: 0.7rem;
    padding: 0.15rem 0.6rem;
    border-radius: 50px;
    font-weight: 600;
  }

  .kp-low { background: rgba(100,100,120,0.2); color: #8a8aaa; border: 1px solid rgba(100,100,120,0.3); }
  .kp-moderate { background: rgba(200,180,0,0.12); color: #d4c030; border: 1px solid rgba(200,180,0,0.25); }
  .kp-good { background: rgba(0,200,100,0.12); color: #4caf80; border: 1px solid rgba(0,200,100,0.25); }
  .kp-excellent { background: rgba(160,80,255,0.15); color: #b07af5; border: 1px solid rgba(160,80,255,0.3); }
  .kp-unknown { background: rgba(100,100,120,0.1); color: #5a5a7a; border: 1px solid rgba(100,100,120,0.15); }

  .aurora-cities {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .aurora-city-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.6rem 1rem;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(108,99,255,0.08);
    border-radius: 8px;
    flex-wrap: wrap;
  }

  .aurora-city-row:hover {
    border-color: rgba(108,99,255,0.2);
  }

  .aurora-city-row.best-viewing {
    border-left: 3px solid rgba(0,200,100,0.5);
    background: rgba(0,200,100,0.04);
  }

  .aurora-city-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: #c8c8e0;
    width: 6.5rem;
    flex-shrink: 0;
  }

  .aurora-cloud {
    font-size: 0.78rem;
    color: #8a8aaa;
    width: 6rem;
    flex-shrink: 0;
  }

  .aurora-cloud.clear { color: #4caf80; }
  .aurora-cloud.cloudy { color: #d4aa30; }
  .aurora-cloud.overcast { color: #8a6a6a; }

  .aurora-stars {
    font-size: 0.85rem;
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  .star-filled { color: #4caf80; }
  .star-empty { color: #3a3a5a; }

  .aurora-rating {
    font-size: 0.75rem;
    color: #8a8aaa;
  }

  .aurora-rating.great { color: #4caf80; }
  .aurora-rating.decent { color: #d4c030; }
  .aurora-rating.poor { color: #8a6a6a; }

  .best-viewing-label {
    font-size: 0.65rem;
    color: #4caf80;
    margin-left: 0.5rem;
  }

  .aurora-note {
    font-size: 0.72rem;
    color: #4a4a6a;
    margin-top: 0.75rem;
    font-style: italic;
  }

  /* Right Now card */
  .ovation-card {
    background: rgba(108, 99, 255, 0.05);
    border: 1px solid rgba(108, 99, 255, 0.2);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
  }

  .ovation-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .ovation-time {
    font-size: 0.7rem;
    color: #6a6a8a;
    background: rgba(255,255,255,0.04);
    padding: 0.15rem 0.5rem;
    border-radius: 50px;
  }

  .ovation-rows {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .ovation-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    flex-wrap: wrap;
  }

  .ovation-row.best-viewing {
    background: rgba(0,200,100,0.04);
    border-left: 3px solid rgba(0,200,100,0.5);
  }

  .ovation-city {
    font-size: 0.82rem;
    font-weight: 600;
    color: #c8c8e0;
    width: 6.5rem;
    flex-shrink: 0;
  }

  .ovation-bar {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
  }

  .ovation-seg {
    width: 12px;
    height: 16px;
    border-radius: 2px;
    background: #2a2a4a;
  }

  .ovation-seg.filled { background: #4caf80; }
  .ovation-seg.filled.high { background: #b07af5; }

  .ovation-val {
    font-size: 0.82rem;
    color: #c8c8e0;
    font-weight: 700;
    width: 2rem;
    text-align: center;
    flex-shrink: 0;
  }

  .ovation-label {
    font-size: 0.78rem;
    color: #8a8aaa;
  }

  .ovation-label.level-none { color: #5a5a7a; }
  .ovation-label.level-low { color: #8a8aaa; }
  .ovation-label.level-moderate { color: #d4c030; }
  .ovation-label.level-high { color: #4caf80; }
  .ovation-label.level-very-high { color: #b07af5; }

  .outlook-separator {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6c63ff;
    margin: 2rem 0 1rem;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .city-grid { grid-template-columns: 1fr; }
    .day-city-row { gap: 0.5rem; }
    .day-city-name { width: 5rem; }
    .day-city-condition { width: auto; }
    .ovation-city { width: 5rem; }
    .day-city-precip { margin-left: 0; }
    .aurora-city-name { width: 5rem; }
    .aurora-cloud { width: auto; }
  }
</style>

<div class="weather-page">
  <div class="page-header">
    <div class="page-title">Alaska Weather</div>
    <div class="page-sub">Anchorage · Seward · Wasilla</div>
    <span class="why-note">trip planning</span>
  </div>

  <div class="view-toggle">
    <button class="toggle-btn tab-btn" data-tab="weather">Weather</button>
    <button class="toggle-btn tab-btn" data-tab="aurora">Aurora</button>
  </div>

  <div id="weatherTab" class="tab-content">
    <div class="view-toggle" id="weatherSubToggle" style="margin-bottom:1.5rem;">
      <button class="toggle-btn sub-toggle-btn" data-view="day">By Day</button>
      <button class="toggle-btn sub-toggle-btn" data-view="city">By City</button>
    </div>

    <div id="weatherContent">
      <div class="status-msg">fetching weather data...</div>
    </div>
  </div>

  <div id="auroraTab" class="tab-content" style="display:none;">
    <div id="auroraContent">
      <div class="status-msg">fetching aurora data...</div>
    </div>
  </div>

  <div class="data-note" id="dataNote">
    Weather from <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Aurora Kp from <a href="https://www.swpc.noaa.gov" target="_blank">NOAA SWPC</a> · Updated on page load
  </div>
</div>

<script>
  // --- Cache ---
  const CACHE_TTL = 60 * 60 * 1000; // 1 hour

  function getCache(key) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      const { timestamp, data } = JSON.parse(raw);
      if (Date.now() - timestamp > CACHE_TTL) return null;
      return { data, timestamp };
    } catch { return null; }
  }

  function setCache(key, data) {
    try {
      localStorage.setItem(key, JSON.stringify({ timestamp: Date.now(), data }));
    } catch { /* quota exceeded — silently fail */ }
  }

  function cacheAgeText(timestamp) {
    const mins = Math.round((Date.now() - timestamp) / 60000);
    if (mins < 1) return 'just now';
    if (mins === 1) return '1 min ago';
    return `${mins} min ago`;
  }

  // --- Config ---
  const CITIES = [
    { name: 'Anchorage', lat: 61.2181, lon: -149.9003, sub: '61.22°N 149.90°W' },
    { name: 'Seward',    lat: 60.1042, lon: -149.4422, sub: '60.10°N 149.44°W' },
    { name: 'Wasilla',   lat: 61.5814, lon: -149.4394, sub: '61.58°N 149.44°W' },
  ];

  const WMO = {
    0:  { label: 'Clear sky',        emoji: '☀️' },
    1:  { label: 'Mainly clear',     emoji: '🌤️' },
    2:  { label: 'Partly cloudy',    emoji: '⛅' },
    3:  { label: 'Overcast',         emoji: '☁️' },
    45: { label: 'Foggy',            emoji: '🌫️' },
    48: { label: 'Icy fog',          emoji: '🌫️' },
    51: { label: 'Light drizzle',    emoji: '🌦️' },
    53: { label: 'Drizzle',          emoji: '🌦️' },
    55: { label: 'Heavy drizzle',    emoji: '🌧️' },
    61: { label: 'Light rain',       emoji: '🌧️' },
    63: { label: 'Rain',             emoji: '🌧️' },
    65: { label: 'Heavy rain',       emoji: '🌧️' },
    71: { label: 'Light snow',       emoji: '🌨️' },
    73: { label: 'Snow',             emoji: '🌨️' },
    75: { label: 'Heavy snow',       emoji: '❄️' },
    77: { label: 'Snow grains',      emoji: '🌨️' },
    80: { label: 'Light showers',    emoji: '🌦️' },
    81: { label: 'Showers',          emoji: '🌧️' },
    82: { label: 'Heavy showers',    emoji: '⛈️' },
    85: { label: 'Snow showers',     emoji: '🌨️' },
    86: { label: 'Heavy snow shower',emoji: '❄️' },
    95: { label: 'Thunderstorm',     emoji: '⛈️' },
    96: { label: 'Thunderstorm',     emoji: '⛈️' },
    99: { label: 'Thunderstorm',     emoji: '⛈️' },
  };

  function getCondition(code) {
    return WMO[code] || { label: 'Unknown', emoji: '🌡️' };
  }

  function cToF(c) { return Math.round(c * 9 / 5 + 32); }

  function formatDay(dateStr, index) {
    if (index === 0) return 'Today';
    if (index === 1) return 'Tmrw';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short' });
  }

  function formatDayLong(dateStr, index) {
    if (index === 0) return 'Today';
    if (index === 1) return 'Tomorrow';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long' });
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  // Determine best city for a given day index
  function getBestCity(results, dayIndex) {
    let bestIdx = 0;
    let bestPrecip = results[0].data.precip[dayIndex];
    let bestCode = results[0].data.code[dayIndex];

    for (let c = 1; c < results.length; c++) {
      const precip = results[c].data.precip[dayIndex];
      const code = results[c].data.code[dayIndex];
      if (precip < bestPrecip || (precip === bestPrecip && code < bestCode)) {
        bestIdx = c;
        bestPrecip = precip;
        bestCode = code;
      }
    }
    return bestIdx;
  }

  // --- Tab toggle (Weather / Aurora) ---
  let currentTab = 'weather';

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('weatherTab').style.display = currentTab === 'weather' ? 'block' : 'none';
      document.getElementById('auroraTab').style.display = currentTab === 'aurora' ? 'block' : 'none';
    });
  });

  document.querySelector('.tab-btn[data-tab="weather"]').classList.add('active');

  // --- Weather sub-toggle (By Day / By City) ---
  let currentView = 'day';

  document.querySelectorAll('.sub-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = btn.dataset.view;
      document.querySelectorAll('.sub-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelector('.view-city')?.classList.toggle('active', currentView === 'city');
      document.querySelector('.view-day')?.classList.toggle('active', currentView === 'day');
    });
  });

  document.querySelector('.sub-toggle-btn[data-view="day"]').classList.add('active');

  // --- OVATION real-time aurora ---
  function getIntensityLabel(val) {
    if (val <= 0) return { label: 'None', css: 'level-none' };
    if (val <= 2) return { label: 'Low', css: 'level-low' };
    if (val <= 4) return { label: 'Moderate', css: 'level-moderate' };
    if (val <= 6) return { label: 'High', css: 'level-high' };
    return { label: 'Very High', css: 'level-very-high' };
  }

  function renderBar(intensity) {
    const segs = [];
    const isHigh = intensity >= 7;
    for (let i = 0; i < 8; i++) {
      const filled = i < intensity;
      segs.push(`<div class="ovation-seg${filled ? ' filled' : ''}${filled && isHigh ? ' high' : ''}"></div>`);
    }
    return segs.join('');
  }

  async function fetchOvation() {
    const cached = getCache('vtcom_ovation');
    if (cached) return cached.data;

    try {
      const res = await fetch('https://services.swpc.noaa.gov/json/ovation_aurora_latest.json');
      if (!res.ok) return null;
      const json = await res.json();

      const coords = json.coordinates;
      const forecastTime = json['Forecast Time'];

      // For each city, find nearest grid point
      // OVATION uses 0-360 longitude, our cities use negative west longitude
      const cityResults = CITIES.map(city => {
        const targetLon = city.lon < 0 ? city.lon + 360 : city.lon;
        const targetLat = city.lat;

        let bestDist = Infinity;
        let bestIntensity = 0;

        for (const [lon, lat, intensity] of coords) {
          const dLon = Math.abs(lon - targetLon);
          const dLat = Math.abs(lat - targetLat);
          const dist = dLon * dLon + dLat * dLat;
          if (dist < bestDist) {
            bestDist = dist;
            bestIntensity = intensity;
          }
        }

        return { name: city.name, intensity: bestIntensity };
      });

      const result = { forecastTime, cities: cityResults };
      setCache('vtcom_ovation', result);
      return result;
    } catch {
      return null;
    }
  }

  // --- Aurora helpers ---
  function getKpLevel(kp) {
    if (kp === null) return { label: 'No forecast', css: 'kp-unknown', score: 0 };
    if (kp < 2) return { label: `Kp ${kp.toFixed(1)} · Very low`, css: 'kp-low', score: 0 };
    if (kp < 4) return { label: `Kp ${kp.toFixed(1)} · Moderate`, css: 'kp-moderate', score: 1 };
    if (kp < 6) return { label: `Kp ${kp.toFixed(1)} · Good`, css: 'kp-good', score: 2 };
    return { label: `Kp ${kp.toFixed(1)} · Excellent`, css: 'kp-excellent', score: 3 };
  }

  function getCloudLabel(pct) {
    if (pct <= 20) return { label: `${Math.round(pct)}% Clear`, css: 'clear', score: 3 };
    if (pct <= 50) return { label: `${Math.round(pct)}% Partly cloudy`, css: 'clear', score: 2 };
    if (pct <= 80) return { label: `${Math.round(pct)}% Mostly cloudy`, css: 'cloudy', score: 1 };
    return { label: `${Math.round(pct)}% Overcast`, css: 'overcast', score: 0 };
  }

  function getViewability(kpScore, cloudScore) {
    if (kpScore === 0) return { stars: 0, label: 'Unlikely', css: 'poor' };
    if (cloudScore === 0) return { stars: 0, label: 'Blocked by clouds', css: 'poor' };
    const combined = kpScore + cloudScore; // 0-6
    if (combined >= 5) return { stars: 3, label: 'Excellent', css: 'great' };
    if (combined >= 3) return { stars: 2, label: 'Possible', css: 'decent' };
    return { stars: 1, label: 'Faint chance', css: 'poor' };
  }

  function renderStars(n) {
    let s = '';
    for (let i = 0; i < 3; i++) {
      s += `<span class="${i < n ? 'star-filled' : 'star-empty'}">★</span>`;
    }
    return s;
  }

  async function fetchKpForecast() {
    const cached = getCache('vtcom_kp');
    if (cached) return cached.data;

    try {
      const res = await fetch('https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json');
      if (!res.ok) return null;
      const data = await res.json();

      // Group by date (Alaska time = UTC-9 standard, UTC-8 daylight)
      // Use nighttime hours (UTC 04:00-14:00 = ~8PM-6AM AKDT) for aurora relevance
      const byDay = {};
      for (const entry of data) {
        const ts = entry[0]; // "2026-03-18 03:00:00"
        const kp = parseFloat(entry[1]);
        if (isNaN(kp)) continue;

        // Parse as UTC, convert to Alaska date
        const utcDate = new Date(ts + 'Z');
        const akHour = new Date(utcDate.getTime() - 8 * 3600000); // AKDT = UTC-8
        const dateKey = akHour.toISOString().slice(0, 10);

        // Prefer nighttime hours (local 8PM-6AM = utcHour 4-14 roughly)
        const utcHour = utcDate.getUTCHours();
        const isNight = utcHour >= 4 && utcHour <= 14;

        if (!byDay[dateKey]) byDay[dateKey] = { all: [], night: [] };
        byDay[dateKey].all.push(kp);
        if (isNight) byDay[dateKey].night.push(kp);
      }

      // Average per day, prefer nighttime values
      const result = {};
      for (const [date, vals] of Object.entries(byDay)) {
        const arr = vals.night.length > 0 ? vals.night : vals.all;
        result[date] = arr.reduce((a, b) => a + b, 0) / arr.length;
      }
      setCache('vtcom_kp', result);
      return result;
    } catch {
      return null;
    }
  }

  // --- Fetch & render ---
  async function loadWeather() {
    const container = document.getElementById('weatherContent');
    const auroraContainer = document.getElementById('auroraContent');

    try {
      let allData;
      let weatherFromCache = false;
      let weatherCacheTime = null;

      const weatherCache = getCache('vtcom_weather');
      if (weatherCache) {
        allData = weatherCache.data;
        weatherFromCache = true;
        weatherCacheTime = weatherCache.timestamp;
      } else {
        const fetches = CITIES.map(city => {
          const url = 'https://api.open-meteo.com/v1/forecast'
            + `?latitude=${city.lat}&longitude=${city.lon}`
            + '&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,cloudcover_mean'
            + '&temperature_unit=celsius'
            + '&timezone=America%2FAnchorage'
            + '&forecast_days=5';
          return fetch(url).then(r => {
            if (!r.ok) throw new Error('API error');
            return r.json();
          });
        });
        allData = await Promise.all(fetches);
        setCache('vtcom_weather', allData);
      }

      // Fetch Kp + OVATION (both have their own caching)
      const [kpData, ovationData] = await Promise.all([
        fetchKpForecast(),
        fetchOvation()
      ]);

      const results = allData.map((data, i) => ({
        name: CITIES[i].name,
        sub: CITIES[i].sub,
        data: {
          time: data.daily.time,
          max: data.daily.temperature_2m_max,
          min: data.daily.temperature_2m_min,
          code: data.daily.weathercode,
          precip: data.daily.precipitation_probability_max,
          cloud: data.daily.cloudcover_mean || [],
        }
      }));

      const numDays = results[0].data.time.length;

      // ========== BY CITY VIEW ==========
      const cityColumns = results.map((city, cityIdx) => {
        const days = [];
        for (let d = 0; d < numDays; d++) {
          const cond = getCondition(city.data.code[d]);
          const highC = Math.round(city.data.max[d]);
          const lowC = Math.round(city.data.min[d]);
          const highF = cToF(highC);
          const lowF = cToF(lowC);
          const precip = city.data.precip[d];
          const isBest = getBestCity(results, d) === cityIdx;
          days.push(`
            <div class="city-day ${isBest ? 'best' : ''}">
              <span class="city-day-name">${formatDay(city.data.time[d], d)}</span>
              <span class="city-day-emoji">${cond.emoji}</span>
              <div class="city-day-info">
                <div class="city-day-temps"><span class="high">${highF}°F</span> / ${lowF}°F</div>
                <div class="city-day-alt">${highC}°C / ${lowC}°C</div>
              </div>
              <span class="city-day-precip ${precip >= 40 ? 'wet' : ''}">💧${precip}%</span>
            </div>
          `);
        }
        return `
          <div class="city-column">
            <div class="city-name">${city.name}</div>
            <div class="city-coords">${city.sub}</div>
            ${days.join('')}
          </div>
        `;
      }).join('');

      // ========== BY DAY VIEW ==========
      const daySections = [];
      for (let d = 0; d < numDays; d++) {
        const bestIdx = getBestCity(results, d);
        const rows = results.map((city, cityIdx) => {
          const cond = getCondition(city.data.code[d]);
          const highC = Math.round(city.data.max[d]);
          const lowC = Math.round(city.data.min[d]);
          const highF = cToF(highC);
          const lowF = cToF(lowC);
          const precip = city.data.precip[d];
          const isBest = cityIdx === bestIdx;
          return `
            <div class="day-city-row ${isBest ? 'best' : ''}">
              <span class="day-city-name">${city.name}${isBest ? '<span class="best-label">✦ best bet</span>' : ''}</span>
              <span class="day-city-emoji">${cond.emoji}</span>
              <span class="day-city-condition">${cond.label}</span>
              <span class="day-city-temps">
                <span class="high">${highF}°F</span> / ${lowF}°F
                <span class="day-city-alt">(${highC}°C / ${lowC}°C)</span>
              </span>
              <span class="day-city-precip ${precip >= 40 ? 'wet' : ''}">💧 ${precip}%</span>
            </div>
          `;
        }).join('');

        daySections.push(`
          <div class="day-section">
            <div class="day-header">
              ${formatDayLong(results[0].data.time[d], d)}
              <span class="day-date">${formatDate(results[0].data.time[d])}</span>
            </div>
            <div class="day-cities">${rows}</div>
          </div>
        `);
      }

      container.innerHTML = `
        <div class="view-day ${currentView === 'day' ? 'active' : ''}">
          ${daySections.join('')}
        </div>
        <div class="view-city ${currentView === 'city' ? 'active' : ''}">
          <div class="city-grid">${cityColumns}</div>
        </div>
      `;

      // ========== AURORA SECTION ==========
      const auroraDays = [];
      for (let d = 0; d < numDays; d++) {
        const dateKey = results[0].data.time[d];
        const kpVal = kpData ? (kpData[dateKey] ?? null) : null;
        const kpLevel = getKpLevel(kpVal);

        // Per-city aurora data
        const cityRows = results.map((city, cityIdx) => {
          const cloudPct = city.data.cloud[d] ?? 50;
          const cloud = getCloudLabel(cloudPct);
          const view = kpVal !== null
            ? getViewability(kpLevel.score, cloud.score)
            : { stars: 0, label: cloud.score >= 2 ? 'Clear skies (Kp unknown)' : 'Cloudy (Kp unknown)', css: 'poor' };
          return { cityIdx, name: city.name, cloud, view, cloudPct };
        });

        // Best viewing = highest viewability stars, break ties by lowest cloud %
        let bestIdx = 0;
        for (let c = 1; c < cityRows.length; c++) {
          const curr = cityRows[c], best = cityRows[bestIdx];
          if (curr.view.stars > best.view.stars ||
              (curr.view.stars === best.view.stars && curr.cloudPct < best.cloudPct)) {
            bestIdx = c;
          }
        }

        const rows = cityRows.map((row, idx) => {
          const isBest = idx === bestIdx && row.view.stars > 0;
          return `
            <div class="aurora-city-row ${isBest ? 'best-viewing' : ''}">
              <span class="aurora-city-name">${row.name}${isBest ? '<span class="best-viewing-label">✦ best viewing</span>' : ''}</span>
              <span class="aurora-cloud ${row.cloud.css}">${row.cloud.label}</span>
              <span class="aurora-stars">${renderStars(row.view.stars)}</span>
              <span class="aurora-rating ${row.view.css}">${row.view.label}</span>
            </div>
          `;
        }).join('');

        auroraDays.push(`
          <div class="aurora-day">
            <div class="aurora-day-header">
              ${formatDayLong(dateKey, d)}
              <span class="day-date">${formatDate(dateKey)}</span>
              <span class="kp-badge ${kpLevel.css}">${kpLevel.label}</span>
            </div>
            <div class="aurora-cities">${rows}</div>
          </div>
        `);
      }

      const kpNote = kpData
        ? 'Kp index averaged from nighttime hours (8PM–6AM AKDT). Higher Kp = stronger aurora.'
        : 'Kp data unavailable — cloud cover still shown for planning.';

      // OVATION "Right Now" card
      let ovationHTML = '';
      if (ovationData) {
        const fcTime = new Date(ovationData.forecastTime + 'Z');
        const timeStr = fcTime.toLocaleTimeString('en-US', {
          hour: 'numeric', minute: '2-digit',
          timeZone: 'America/Anchorage', timeZoneName: 'short'
        });

        // Find best city (highest intensity, break ties by cloud cover today)
        let bestOvIdx = 0;
        for (let c = 1; c < ovationData.cities.length; c++) {
          const curr = ovationData.cities[c], best = ovationData.cities[bestOvIdx];
          if (curr.intensity > best.intensity ||
              (curr.intensity === best.intensity &&
               (results[c]?.data.cloud[0] ?? 50) < (results[bestOvIdx]?.data.cloud[0] ?? 50))) {
            bestOvIdx = c;
          }
        }

        const ovRows = ovationData.cities.map((c, idx) => {
          const level = getIntensityLabel(c.intensity);
          const isBest = idx === bestOvIdx && c.intensity > 0;
          return `
            <div class="ovation-row ${isBest ? 'best-viewing' : ''}">
              <span class="ovation-city">${c.name}${isBest ? '<span class="best-viewing-label">✦ best viewing</span>' : ''}</span>
              <div class="ovation-bar">${renderBar(c.intensity)}</div>
              <span class="ovation-val">${c.intensity}/8</span>
              <span class="ovation-label ${level.css}">${level.label}</span>
            </div>
          `;
        }).join('');

        ovationHTML = `
          <div class="ovation-card">
            <div class="ovation-header">
              <div class="section-label" style="margin-bottom:0">// aurora right now</div>
              <span class="ovation-time">as of ${timeStr}</span>
            </div>
            <div class="ovation-rows">${ovRows}</div>
          </div>
        `;
      } else {
        ovationHTML = '<div class="aurora-note" style="margin-bottom:2rem;">Real-time aurora data unavailable.</div>';
      }

      auroraContainer.innerHTML = `
        <div class="aurora-section">
          ${ovationHTML}
          <div class="outlook-separator">// 5-day outlook (Kp-based)</div>
          ${auroraDays.join('')}
          <div class="aurora-note">${kpNote}</div>
        </div>
      `;

      // Update footer with cache status
      const noteEl = document.getElementById('dataNote');
      const sources = 'Weather from <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Aurora Kp from <a href="https://www.swpc.noaa.gov" target="_blank">NOAA SWPC</a>';
      if (weatherFromCache && weatherCacheTime) {
        noteEl.innerHTML = sources + ` · <span style="color:#4caf80">cached · fetched ${cacheAgeText(weatherCacheTime)}</span>`;
      } else {
        noteEl.innerHTML = sources + ' · Updated just now';
      }

    } catch (err) {
      container.innerHTML = '<div class="error-msg">couldn\'t load weather data. try refreshing.</div>';
      auroraContainer.innerHTML = '';
    }
  }

  loadWeather();
</script>
